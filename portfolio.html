<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio — Student Photo Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <div class="mark">MADE@TheWOnd'ry<span class="dot">.</span></div>
      <nav>
        <a href="index.html">&larr; Submit a photo</a>
      </nav>
    </header>

    <h1 style="font-size: 30px; margin-bottom: 10px;">Your portfolio</h1>
    <p style="color: var(--ash); margin-bottom: 24px; max-width: 50ch; line-height: 1.6;">
      Enter the email you used on the submission form to pull up everything you've logged.
    </p>

    <form id="lookup-form" class="lookup">
      <input type="email" id="email-input" placeholder="you@vanderbilt.edu" required autocomplete="email">
      <button type="submit" class="btn btn-primary">View portfolio</button>
    </form>
    <div id="status" class="status-line"></div>

    <div id="results"></div>

    <div id="share-bar" class="share-bar" hidden>
      <span class="mono">Shareable link:</span>
      <button id="copy-link" class="btn btn-secondary" type="button">Copy link</button>
    </div>
  </div>

  <script src="/portfolio.js"></script>
</body>
</html>

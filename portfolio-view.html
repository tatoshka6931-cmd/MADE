<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Playfair+Display:opsz,wght@5..120,500;5..120,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-presentation">
  <main class="presentation-shell">
    <header class="presentation-header">
      <a class="presentation-back" href="portfolio.html">← All projects</a>
      <div class="presentation-header-right">
        <img class="presentation-logo" src="/header_logo.png" alt="Wond'ry">
        <div class="presentation-actions">
          <button id="copy-presentation-link" class="presentation-action" type="button">Copy link</button>
          <button id="save-presentation-pdf" class="presentation-action presentation-action-dark" type="button">Save as PDF</button>
        </div>
      </div>
    </header>
    <div id="presentation-status" class="presentation-status" role="status">Loading project…</div>
    <article id="presentation" hidden></article>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/portfolio-view.js"></script>
</body>
</html>
